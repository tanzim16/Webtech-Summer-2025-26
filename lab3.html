<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Performance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Introduce Myself-->
    <h1>Welcome to Pental Shop Lab-3</h1>

    <h2>About This lab</h2>
  
    <p>In this lab, you will learn basic HTML, structure, formating text, creating simple tables and using for input.</p>
    
    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock!</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>
        </tbody>
    </table>

    <div class="contact-container">
        <h3>Contact Information</h3>
        <form>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group textarea-group">
                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>
            </div>
        </form>
    </div>
</body>
</html>
